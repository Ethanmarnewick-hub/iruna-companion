<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Iruna Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #080c10;
  --bg2:       #0d1117;
  --bg3:       #111820;
  --panel:     #0d1520;
  --border:    rgba(0,180,255,0.2);
  --border2:   rgba(0,200,255,0.45);
  --neon:      #00c8ff;
  --neon-dim:  rgba(0,200,255,0.5);
  --neon-glow: 0 0 8px rgba(0,200,255,0.6), 0 0 20px rgba(0,200,255,0.2);
  --neon-glow-sm: 0 0 6px rgba(0,200,255,0.4);
  --text:      #ffffff;
  --text-dim:  rgba(255,255,255,0.6);
  --text-muted:rgba(255,255,255,0.3);
  --purple:    #a78bff;
  --teal:      #00ffcc;
  --amber:     #ffaa00;
  --red:       #ff4060;
  --header-h:  42px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background: var(--bg);
  color: var(--text);
  font-family: 'Cinzel', serif;
  min-height:100vh;
  padding:0;
  background-image:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,150,255,0.06) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(0,100,200,0.04) 0%, transparent 60%);
}

/* TOP BAR */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  background: rgba(8,12,16,0.95);
  border-bottom: 1px solid var(--border2);
  padding: 0 10px;
  height: var(--header-h);
  position: sticky; top:0; z-index:100;
  box-shadow: 0 1px 0 rgba(0,200,255,0.15), 0 4px 20px rgba(0,0,0,0.8);
}
.topbar-title{
  font-size:13px; font-weight:700; letter-spacing:0.18em;
  color: var(--neon);
  text-shadow: var(--neon-glow);
  flex:1; text-align:center;
}
.tab-pill{ display:flex; gap:5px; }
.tab-pill button{
  padding: 5px 13px;
  font-family:'Cinzel',serif; font-size:10px; font-weight:600; letter-spacing:0.07em;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-muted);
  cursor:pointer;
  transition: all 0.15s;
}
.tab-pill button.active{
  background: rgba(0,200,255,0.08);
  border-color: var(--neon);
  color: var(--neon);
  box-shadow: var(--neon-glow-sm);
}
.tab-pill button:hover:not(.active){ border-color:var(--border2); color:var(--text-dim); }

/* MAIN */
.main{ max-width:540px; margin:0 auto; padding:12px 10px 50px; }
.section{ display:none; }
.section.active{ display:block; }

/* PANEL */
.panel{
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 12px;
  overflow:hidden;
  position:relative;
  box-shadow: 0 0 0 1px rgba(0,200,255,0.04), 0 4px 24px rgba(0,0,0,0.6), inset 0 1px 0 rgba(0,200,255,0.06);
}
.panel-header{
  background: rgba(0,200,255,0.05);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  font-size:11px; letter-spacing:0.14em; color: var(--neon);
  text-align:center;
  text-shadow: var(--neon-glow-sm);
}

/* ROW */
.row{
  display:flex; align-items:center;
  border-bottom: 1px solid rgba(0,200,255,0.08);
  min-height:44px;
}
.row:last-child{ border-bottom:none; }
.row-label{
  width:130px; flex-shrink:0;
  padding: 8px 14px;
  font-size:11px; color:var(--text-dim); letter-spacing:0.07em;
  border-right: 1px solid rgba(0,200,255,0.08);
}
.row-input{
  flex:1; padding:7px 10px;
  font-family:'Share Tech Mono',monospace; font-size:15px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(0,200,255,0.2);
  border-radius:3px;
  color: #fff;
  outline:none;
  margin: 6px 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.row-input:focus{ border-color:var(--neon); box-shadow: var(--neon-glow-sm); }
.row-input::placeholder{ color:var(--text-muted); font-size:12px; font-family:'Cinzel',serif; }

/* TRIANGLE BUTTONS */
.tri-btn{
  width:30px; height:30px; flex-shrink:0;
  background: rgba(0,200,255,0.08);
  border: 1px solid var(--border2);
  border-radius:3px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  margin:0 3px;
  transition: all 0.1s;
  box-shadow: var(--neon-glow-sm);
}
.tri-btn:hover{ background:rgba(0,200,255,0.18); box-shadow:var(--neon-glow); }
.tri-btn:active{ transform:scale(0.91); }
.tri-btn::after{ content:''; display:block; border-style:solid; }
.tri-btn.left::after{ border-width:6px 9px 6px 0; border-color:transparent var(--neon) transparent transparent; }
.tri-btn.right::after{ border-width:6px 0 6px 9px; border-color:transparent transparent transparent var(--neon); }
.val-display{
  min-width:52px; text-align:center;
  font-family:'Share Tech Mono',monospace; font-size:14px; color:var(--neon);
  text-shadow: var(--neon-glow-sm);
}

/* STATS */
.stat-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; padding:10px; }
.stat-row.two{ grid-template-columns:repeat(2,1fr); }
.stat-box{
  background: rgba(0,200,255,0.04);
  border:1px solid var(--border);
  border-radius:4px; padding:10px 6px; text-align:center;
  box-shadow: 0 0 12px rgba(0,200,255,0.08), inset 0 1px 0 rgba(0,200,255,0.06);
}
.stat-n{ font-family:'Share Tech Mono',monospace; font-size:15px; color:#fff; line-height:1.2; text-shadow: var(--neon-glow-sm); }
.stat-n.sm{ font-size:11px; }
.stat-l{ font-size:10px; color:var(--text-muted); margin-top:3px; line-height:1.3; letter-spacing:0.04em; }

/* BARS */
.bar-section{ padding:10px 14px 8px; }
.bar-section+.bar-section{ border-top:1px solid rgba(0,200,255,0.08); }
.bar-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
.bar-lbl{ font-size:11px; color:var(--text-dim); letter-spacing:0.04em; }
.bar-pct{ font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text-muted); }
.done-tag{ font-size:10px; color:var(--teal); letter-spacing:0.06em; background:rgba(0,255,204,0.08); border:1px solid rgba(0,255,204,0.3); border-radius:2px; padding:1px 6px; text-shadow:0 0 6px rgba(0,255,204,0.5); }
.bar-track{ height:5px; background:rgba(0,0,0,0.5); border:1px solid rgba(0,200,255,0.12); border-radius:3px; overflow:hidden; margin-bottom:5px; }
.bar-fill{ height:100%; border-radius:3px; transition:width 0.6s cubic-bezier(.4,0,.2,1); }
.fill-purple{ background:var(--purple); box-shadow:0 0 6px rgba(167,139,255,0.6); }
.fill-amber{ background:var(--amber); box-shadow:0 0 6px rgba(255,170,0,0.5); }
.bar-away{ font-size:10px; color:var(--text-muted); font-style:italic; margin-bottom:6px; }

/* PROGRESS */
.prog-row{ padding:8px 14px 12px; border-top:1px solid rgba(0,200,255,0.08); }
.prog-top{ display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-bottom:5px; }

/* QUEST */
.q-next{ display:flex; gap:8px; align-items:flex-start; padding:8px 14px; border-top:1px solid rgba(0,200,255,0.08); }
.q-next-arrow{ color:var(--neon-dim); font-size:14px; margin-top:1px; }
.q-next-lbl{ font-size:10px; color:var(--text-muted); display:block; margin-bottom:2px; letter-spacing:0.06em; }
.q-next-name{ font-size:13px; color:var(--text-dim); }
.ep-badge{ font-size:10px; color:var(--neon-dim); background:rgba(0,200,255,0.08); border:1px solid var(--border); border-radius:2px; padding:1px 5px; margin-left:5px; }

/* SEARCH */
.search-wrap{ display:flex; gap:6px; padding:8px 10px; border-bottom:1px solid rgba(0,200,255,0.08); }
.search-input{
  flex:1; padding:8px 12px;
  font-family:'Cinzel',serif; font-size:12px;
  background:rgba(0,0,0,0.3); border:1px solid var(--border);
  border-radius:3px; color:#fff; outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus{ border-color:var(--neon); box-shadow:var(--neon-glow-sm); }
.search-input::placeholder{ color:var(--text-muted); }
.track-btn{
  padding:8px 14px;
  font-family:'Cinzel',serif; font-size:10px; font-weight:700; letter-spacing:0.08em;
  background: rgba(0,200,255,0.08);
  border:1px solid var(--border2); border-radius:3px;
  color:var(--neon); cursor:pointer; white-space:nowrap;
  transition:all 0.15s; flex-shrink:0;
  box-shadow: var(--neon-glow-sm);
}
.track-btn:hover{ background:rgba(0,200,255,0.16); box-shadow:var(--neon-glow); }
.track-btn:active{ transform:scale(0.97); }
.suggestions{
  display:none; background:var(--bg3);
  border:1px solid var(--border2); border-top:none;
  border-radius:0 0 4px 4px; overflow:hidden; margin:0 0 8px;
}
.sug-item{
  padding:8px 14px; font-size:12px; cursor:pointer;
  color:var(--text-dim); border-bottom:1px solid rgba(0,200,255,0.08);
  display:flex; justify-content:space-between; align-items:center;
  transition:background 0.12s;
}
.sug-item:last-child{ border-bottom:none; }
.sug-item:hover{ background:rgba(0,200,255,0.06); color:#fff; }

.not-found{ font-size:13px; color:var(--text-muted); font-style:italic; text-align:center; padding:1.5rem 0; }
.error-msg{ font-size:11px; color:var(--red); padding:4px 14px 8px; letter-spacing:0.04em; }
.result-hidden{ display:none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="tab-pill">
    <button class="active" onclick="switchTab('quest')">QUESTS</button>
    <button onclick="switchTab('exp')">EXP CALC</button>
  </div>
  <div class="topbar-title">IRUNA COMPANION</div>
  <div style="width:120px"></div>
</div>

<div class="main">

  <!-- QUEST SECTION -->
  <div class="section active" id="section-quest">
    <div class="panel">
      <div class="panel-header">MAIN QUEST TRACKER</div>
      <div class="search-wrap">
        <input class="search-input" id="qInput" placeholder="Enter quest name..." oninput="onType()" onkeydown="if(event.key==='Enter')doSearch()"/>
        <button class="track-btn" onclick="doSearch()">TRACK</button>
      </div>
      <div class="suggestions" id="sugg"></div>
    </div>
    <div id="qResult"></div>
  </div>

  <!-- EXP SECTION -->
  <div class="section" id="section-exp">
    <div class="panel">
      <div class="panel-header">EXP TO GOAL</div>
      <div class="row">
        <div class="row-label">Current Level</div>
        <input class="row-input" type="number" id="curLv" min="1" max="444" placeholder="e.g. 150" oninput="calculate()"/>
      </div>
      <div class="row">
        <div class="row-label">Bar % (est.)</div>
        <div style="display:flex;align-items:center;flex:1;padding:0 8px;gap:5px">
          <button class="tri-btn left" onclick="nudgePct(-1)"></button>
          <div class="val-display" id="pctDisplay">0%</div>
          <button class="tri-btn right" onclick="nudgePct(1)"></button>
          <input type="range" id="curPct" min="0" max="99" value="0" oninput="onPctSlide()" style="flex:1;accent-color:var(--neon);height:4px;"/>
        </div>
      </div>
      <div class="row">
        <div class="row-label">Goal Level</div>
        <input class="row-input" type="number" id="goalLv" min="2" max="445" placeholder="e.g. 200" oninput="calculate()"/>
      </div>
      <div id="calcError" class="error-msg" style="display:none"></div>
      <div id="calcResult" class="result-hidden">
        <!-- Next level hero -->
        <div style="padding:14px 14px 10px;border-top:1px solid rgba(0,200,255,0.08);text-align:center">
          <div style="font-size:10px;letter-spacing:0.12em;color:var(--text-muted);margin-bottom:6px">EXP TO NEXT LEVEL</div>
          <div id="nextLvExp" style="font-family:'Share Tech Mono',monospace;font-size:28px;color:#fff;text-shadow:var(--neon-glow);line-height:1"></div>
          <div style="margin-top:8px">
            <div class="prog-top" style="margin-bottom:5px"><span id="barLabel">Progress</span><span id="barPct">0%</span></div>
            <div class="bar-track"><div class="bar-fill fill-purple" id="progressBar" style="width:0%"></div></div>
          </div>
        </div>
        <!-- Goal divider -->
        <div id="goalSection" class="result-hidden">
          <div style="padding:10px 14px 4px;border-top:1px solid rgba(0,200,255,0.08)">
            <div style="font-size:10px;letter-spacing:0.12em;color:var(--text-muted);margin-bottom:8px;text-align:center">TO GOAL LEVEL</div>
          </div>
          <div class="stat-row two" id="statRow" style="padding-top:0"></div>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
function switchTab(t){
  document.querySelectorAll('.tab-pill button').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='quest')||(i===1&&t==='exp')));
  document.getElementById('section-quest').classList.toggle('active',t==='quest');
  document.getElementById('section-exp').classList.toggle('active',t==='exp');
}

const cumExp=[0];
for(let i=0;i<EXP_PER_LEVEL.length;i++) cumExp.push(cumExp[i]+EXP_PER_LEVEL[i]);
function fmt(n){return Math.round(n).toLocaleString();}
function expToNext(lv){return(lv>=1&&lv<=444)?EXP_PER_LEVEL[lv-1]:0;}
function expBetween(from,to,done){return Math.max(0,(cumExp[to-1]-cumExp[from-1])-(done||0));}

function onPctSlide(){
  const v=parseInt(document.getElementById('curPct').value);
  document.getElementById('pctDisplay').textContent=v+'%';
  calculate();
}
function nudgePct(d){
  const el=document.getElementById('curPct');
  el.value=Math.max(0,Math.min(99,parseInt(el.value||0)+d));
  onPctSlide();
}
function calculate(){
  const curLv=parseInt(document.getElementById('curLv').value);
  const goalLv=parseInt(document.getElementById('goalLv').value);
  const curPct=parseInt(document.getElementById('curPct').value)||0;
  const errEl=document.getElementById('calcError');
  const resEl=document.getElementById('calcResult');
  const goalSection=document.getElementById('goalSection');
  errEl.style.display='none'; resEl.classList.add('result-hidden');
  if(!curLv) return;
  if(curLv<1||curLv>444){errEl.textContent='Current level must be 1–444.';errEl.style.display='block';return;}

  const thisLvTotal=expToNext(curLv);
  const curExpEst=Math.round(thisLvTotal*(curPct/100));
  const expLeft=Math.max(0,thisLvTotal-curExpEst);

  document.getElementById('nextLvExp').textContent=fmt(expLeft);
  document.getElementById('barLabel').textContent=`Lv${curLv} → Lv${curLv+1}`;
  document.getElementById('barPct').textContent=curPct>0?`~${curPct}%`:'0%';
  document.getElementById('progressBar').style.width=curPct+'%';

  // Goal section — only show if goal is valid
  if(goalLv && goalLv>curLv && goalLv>=2 && goalLv<=445){
    const needed=expBetween(curLv,goalLv,curExpEst);
    const levels=goalLv-curLv;
    document.getElementById('statRow').innerHTML=`
      <div class="stat-box"><div class="stat-n">${fmt(needed)}</div><div class="stat-l">EXP TO LV${goalLv}</div></div>
      <div class="stat-box"><div class="stat-n">${levels}</div><div class="stat-l">LEVELS TO GAIN</div></div>`;
    goalSection.classList.remove('result-hidden');
  } else {
    goalSection.classList.add('result-hidden');
  }

  resEl.classList.remove('result-hidden');

const EP_TOTALS={1:82,2:28,3:29,4:17,5:21,6:33};
const TOTAL_GLOBAL=Object.values(EP_TOTALS).reduce((a,b)=>a+b,0);
const APOSTOLIA=QUESTS.find(q=>q.ep===3&&q.idx===0);
const SPECIA=QUESTS.find(q=>q.ep===6&&q.idx===0);
function globalIdx(q){let g=0;for(let e=1;e<q.ep;e++)g+=EP_TOTALS[e];return g+q.idx;}
const APOSTOLIA_G=globalIdx(APOSTOLIA);
const SPECIA_G=globalIdx(SPECIA);

function onType(){
  const v=document.getElementById('qInput').value.trim();
  const sd=document.getElementById('sugg');
  if(v.length<2){sd.style.display='none';return;}
  const m=QUESTS.filter(q=>q.name.toLowerCase().includes(v.toLowerCase())).slice(0,6);
  if(!m.length){sd.style.display='none';return;}
  sd.innerHTML=m.map(q=>`<div class="sug-item" onclick="selectQ(${QUESTS.indexOf(q)})">
    <span>${q.name}</span><span class="ep-badge">EP ${q.ep}</span></div>`).join('');
  sd.style.display='block';
}
function selectQ(i){
  const q=QUESTS[i];
  document.getElementById('qInput').value=q.name;
  document.getElementById('sugg').style.display='none';
  renderResult(q);
}
function doSearch(){
  document.getElementById('sugg').style.display='none';
  const v=document.getElementById('qInput').value.trim();
  if(!v) return;
  const match=QUESTS.find(q=>q.name.toLowerCase()===v.toLowerCase())||QUESTS.find(q=>q.name.toLowerCase().includes(v.toLowerCase()));
  if(!match){document.getElementById('qResult').innerHTML=`<p class="not-found">Quest not found — try a few words.</p>`;return;}
  renderResult(match);
}
function mBar(pct,cls,label,done){
  const right=done?`<span class="done-tag">UNLOCKED</span>`:`<span class="bar-pct">${pct}%</span>`;
  return `<div class="bar-top"><span class="bar-lbl">${label}</span>${right}</div>
  <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>`;
}
function renderResult(q){
  const gi=globalIdx(q);
  const overall=Math.round((gi/TOTAL_GLOBAL)*100);
  const aPct=Math.min(100,Math.round((gi/APOSTOLIA_G)*100));
  const sPct=Math.min(100,Math.round((gi/SPECIA_G)*100));
  const aDone=gi>=APOSTOLIA_G, sDone=gi>=SPECIA_G;
  const epDone=q.idx+1, epTotal=EP_TOTALS[q.ep], rem=epTotal-epDone;
  const epQ=QUESTS.filter(x=>x.ep===q.ep).sort((a,b)=>a.idx-b.idx);
  const pos=epQ.findIndex(x=>x.idx===q.idx);
  let nextQ=null;
  if(pos<epQ.length-1) nextQ=epQ[pos+1];
  else{const n=QUESTS.filter(x=>x.ep===q.ep+1).sort((a,b)=>a.idx-b.idx);if(n.length)nextQ=n[0];}
  document.getElementById('qResult').innerHTML=`
  <div class="panel">
    <div class="panel-header">EPISODE ${q.ep} &nbsp;·&nbsp; QUEST ${epDone} / ${epTotal}</div>
    <div style="padding:10px 14px 8px;border-bottom:1px solid rgba(107,76,30,0.35)">
      <div style="font-size:10px;color:var(--text-muted);letter-spacing:0.08em;margin-bottom:4px">CURRENT QUEST</div>
      <div style="font-size:15px;color:var(--text);line-height:1.35;font-family:'Cinzel',serif">${q.name}</div>
    </div>
    ${nextQ?`<div class="q-next">
      <span class="q-next-arrow">›</span>
      <div><span class="q-next-lbl">NEXT QUEST</span>
      <span class="q-next-name">${nextQ.name}${nextQ.ep!==q.ep?`<span class="ep-badge">EP ${nextQ.ep}</span>`:''}</span></div>
    </div>`:''}
    <div class="stat-row">
      <div class="stat-box"><div class="stat-n">${epDone}</div><div class="stat-l">DONE EP${q.ep}</div></div>
      <div class="stat-box"><div class="stat-n">${rem}</div><div class="stat-l">LEFT EP${q.ep}</div></div>
      <div class="stat-box"><div class="stat-n">${overall}%</div><div class="stat-l">OVERALL</div></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">MILESTONES</div>
    <div class="bar-section">
      ${mBar(aPct,'fill-purple','Unlock Apostalia — Kill Irai (Ep 3)',aDone)}
      ${aDone?'':`<div class="bar-away">${APOSTOLIA_G-gi} quest${APOSTOLIA_G-gi!==1?'s':''} away</div>`}
    </div>
    <div class="bar-section">
      ${mBar(sPct,'fill-amber',"Earn Specia's Blessed Stone (Ep 6)",sDone)}
      ${sDone?'':`<div class="bar-away">${SPECIA_G-gi} quest${SPECIA_G-gi!==1?'s':''} away</div>`}
    </div>
  </div>`;
}
